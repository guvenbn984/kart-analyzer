<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111118; font-family: 'DM Sans', system-ui, sans-serif; padding: 24px; display: flex; flex-direction: column; gap: 24px; -webkit-font-smoothing: antialiased; }
.section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #3a3a5c; }
.row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.state { font-size: 10px; color: #2e3050; text-align: center; margin-top: 5px; }
.col { display: flex; flex-direction: column; }

/* Primary */
.btn-primary { padding: 12px 32px; background: linear-gradient(135deg,#e94560,#c0392b); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; box-shadow: 0 4px 16px rgba(233,69,96,0.2); }
.btn-primary.hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(233,69,96,0.35); }
.btn-primary.disabled { opacity: 0.4; cursor: not-allowed; }

/* Secondary */
.btn-secondary { padding: 8px 16px; background: transparent; color: #6b7491; border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
.btn-secondary.hover { background: rgba(255,255,255,0.05); color: #d8dce8; border-color: rgba(255,255,255,0.12); }

/* Pill */
.btn-pill { padding: 5px 14px; background: rgba(255,255,255,0.03); color: #6b7491; border: 1px solid rgba(255,255,255,0.07); border-radius: 99px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-pill.active { background: #e94560; color: #fff; border-color: #e94560; }
.btn-pill.hover { background: rgba(255,255,255,0.06); color: #d8dce8; border-color: rgba(255,255,255,0.12); }

/* Utility */
.btn-utility { padding: 4px 12px; background: rgba(255,255,255,0.03); color: #6b7491; border: 1px solid rgba(255,255,255,0.06); border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
.btn-utility.hover { color: #d8dce8; border-color: rgba(79,195,247,0.3); }
</style></head>
<body>

<div class="section-label">Primary CTA</div>
<div class="row">
  <div class="col"><button class="btn-primary">Анализировать</button><div class="state">default</div></div>
  <div class="col"><button class="btn-primary hover">Анализировать</button><div class="state">hover</div></div>
  <div class="col"><button class="btn-primary disabled" disabled>Анализировать</button><div class="state">disabled</div></div>
</div>

<div class="section-label">Secondary / Back</div>
<div class="row">
  <div class="col"><button class="btn-secondary">← Назад</button><div class="state">default</div></div>
  <div class="col"><button class="btn-secondary hover">← Назад</button><div class="state">hover</div></div>
</div>

<div class="section-label">Session Config Pills</div>
<div class="row">
  <div class="col"><button class="btn-pill">1</button><div class="state">default</div></div>
  <div class="col"><button class="btn-pill active">2</button><div class="state">active</div></div>
  <div class="col"><button class="btn-pill hover">3</button><div class="state">hover</div></div>
</div>

<div class="section-label">Utility</div>
<div class="row">
  <div class="col"><button class="btn-utility">Все</button><div class="state">default</div></div>
  <div class="col"><button class="btn-utility hover">Никто</button><div class="state">hover</div></div>
</div>

</body>
</html>
