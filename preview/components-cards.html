<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111118; font-family: 'DM Sans', system-ui, sans-serif; padding: 24px; display: flex; flex-direction: column; gap: 20px; -webkit-font-smoothing: antialiased; }
.section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #3a3a5c; margin-bottom: -12px; }
</style></head>
<body>

<div class="section-label">Summary Stats</div>
<div style="display:flex;gap:10px;">
  <div style="flex:1;background:#13131f;border-radius:12px;padding:14px 18px;border:1px solid rgba(255,255,255,0.06);">
    <div style="font-size:24px;font-weight:800;color:#e94560;line-height:1.1;">6</div>
    <div style="font-size:11px;color:#6b7491;margin-top:5px;font-weight:500;letter-spacing:0.02em;">ПИЛОТОВ</div>
  </div>
  <div style="flex:1;background:#13131f;border-radius:12px;padding:14px 18px;border:1px solid rgba(255,255,255,0.06);">
    <div style="font-size:24px;font-weight:800;color:#4caf50;line-height:1.1;font-variant-numeric:tabular-nums;">34.521</div>
    <div style="font-size:11px;color:#6b7491;margin-top:5px;font-weight:500;letter-spacing:0.02em;">ЛУЧШИЙ КРУГ</div>
  </div>
  <div style="flex:1;background:#13131f;border-radius:12px;padding:14px 18px;border:1px solid rgba(255,255,255,0.06);">
    <div style="font-size:24px;font-weight:800;color:#4fc3f7;line-height:1.1;">18</div>
    <div style="font-size:11px;color:#6b7491;margin-top:5px;font-weight:500;letter-spacing:0.02em;">КРУГОВ</div>
  </div>
  <div style="flex:1;background:#13131f;border-radius:12px;padding:14px 18px;border:1px solid rgba(255,255,255,0.06);">
    <div style="font-size:24px;font-weight:800;color:#e94560;line-height:1.1;">1</div>
    <div style="font-size:11px;color:#6b7491;margin-top:5px;font-weight:500;letter-spacing:0.02em;">ПИТСТОП</div>
  </div>
</div>

<div class="section-label">Event Info Bar</div>
<div style="display:flex;gap:20px;flex-wrap:wrap;padding:10px 16px;background:#13131f;border-radius:10px;border:1px solid rgba(255,255,255,0.06);font-size:12px;">
  <span><span style="color:#6b7491;">Дата: </span><span style="color:#d8dce8;font-weight:500;">12.04.2024</span></span>
  <span><span style="color:#6b7491;">Время: </span><span style="color:#d8dce8;font-weight:500;">14:30</span></span>
  <span><span style="color:#6b7491;">Событие: </span><span style="color:#d8dce8;font-weight:500;">CityFight</span></span>
  <span><span style="color:#6b7491;">Трасса: </span><span style="color:#d8dce8;font-weight:500;">Lemans City</span></span>
</div>

<div class="section-label">Data Card</div>
<div style="background:#18182a;border-radius:14px;padding:20px;border:1px solid rgba(255,255,255,0.07);">
  <div style="font-size:13px;font-weight:600;color:#4fc3f7;margin-bottom:12px;letter-spacing:0.01em;">Итоговая классификация</div>
  <div style="font-size:12px;color:#6b7491;line-height:1.6;">Данные загружены из PDF-протокола гонки. Все времена кругов проанализированы автоматически.</div>
</div>

</body>
</html>
