<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #111118;
  font-family: -apple-system, BlinkMacSystemFont, 'DM Sans', sans-serif;
  padding: 20px;
}

.table-wrap {
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 12px;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

/* Header */
thead tr {
  background: #16182a;
}
thead th {
  padding: 11px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: #3e4a6a;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  white-space: nowrap;
}
thead th:last-child { text-align: right; }

/* Body */
tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(79,195,247,0.04); }

tbody td {
  padding: 11px 14px;
  color: #c8d0e0;
  white-space: nowrap;
  vertical-align: middle;
}
tbody td:last-child { text-align: right; }

/* Pos column */
.pos {
  font-size: 12px;
  font-weight: 700;
  color: #3e4060;
  width: 32px;
}

/* Podium accent — left border via box-shadow trick */
.p1 { box-shadow: inset 3px 0 0 gold; }
.p2 { box-shadow: inset 3px 0 0 silver; }
.p3 { box-shadow: inset 3px 0 0 #cd7f32; }

/* Driver name */
.driver-name {
  font-weight: 600;
  color: #e0e0e0;
  display: flex;
  align-items: center;
  gap: 8px;
}
.driver-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Time values */
.val-best  { color: #4caf50; font-weight: 600; font-variant-numeric: tabular-nums; }
.val-worst { color: #e94560; font-variant-numeric: tabular-nums; }
.val-num   { color: #8892a4; font-variant-numeric: tabular-nums; }
.val-gap   { color: #8892a4; font-size: 12px; font-variant-numeric: tabular-nums; }

/* Position change badge */
.delta {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 3px 8px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 700;
}
.delta-up   { background: rgba(76,175,80,0.12);  color: #4caf50; }
.delta-same { background: rgba(136,146,164,0.08); color: #4a506a; }
.delta-down { background: rgba(233,69,96,0.12);   color: #e94560; }
</style></head>
<body>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Пилот</th>
        <th>Карт</th>
        <th>Кругов</th>
        <th>Лучший круг</th>
        <th>Средний темп</th>
        <th>Разрыв</th>
        <th>Δ</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="pos p1">1</td>
        <td><div class="driver-name"><div class="driver-dot" style="background:#e94560;"></div>Иванов</div></td>
        <td class="val-num">7</td>
        <td class="val-num">18</td>
        <td class="val-best">34.521</td>
        <td class="val-num">35.104</td>
        <td class="val-gap">—</td>
        <td><span class="delta delta-up">↑ +3</span></td>
      </tr>
      <tr>
        <td class="pos p2">2</td>
        <td><div class="driver-name"><div class="driver-dot" style="background:#4fc3f7;"></div>Петров</div></td>
        <td class="val-num">3</td>
        <td class="val-num">18</td>
        <td class="val-num">34.891</td>
        <td class="val-num">35.412</td>
        <td class="val-gap">+2.1</td>
        <td><span class="delta delta-same">— 0</span></td>
      </tr>
      <tr>
        <td class="pos p3">3</td>
        <td><div class="driver-name"><div class="driver-dot" style="background:#4caf50;"></div>Козлов</div></td>
        <td class="val-num">11</td>
        <td class="val-num">18</td>
        <td class="val-num">35.012</td>
        <td class="val-num">35.720</td>
        <td class="val-gap">+5.3</td>
        <td><span class="delta delta-down">↓ −1</span></td>
      </tr>
      <tr>
        <td class="pos">4</td>
        <td><div class="driver-name"><div class="driver-dot" style="background:#ffd54f;"></div>Сидоров</div></td>
        <td class="val-num">5</td>
        <td class="val-num">17</td>
        <td class="val-num">35.448</td>
        <td class="val-worst">37.102</td>
        <td class="val-gap">+1 кр.</td>
        <td><span class="delta delta-up">↑ +2</span></td>
      </tr>
    </tbody>
  </table>
</div>

</body>
</html>
