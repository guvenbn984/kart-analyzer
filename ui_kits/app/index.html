<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kart Race Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:       #07070f;
    --surface:  rgba(255,255,255,0.09);
    --surface2: rgba(255,255,255,0.26);
    --border:   rgba(255,255,255,0.16);
    --border2:  rgba(255,255,255,0.26);
    --text:     #f0f0f8;
    --dim:      rgba(240,240,248,0.70);
    --dim2:     rgba(240,240,248,0.72);
    --red:      #ff375f;
    --red-glow: rgba(255,55,95,0.28);
    --blue:     #0a84ff;
    --green:    #30d158;
    --yellow:   #ffd60a;
    --orange:   #ff9f0a;
    --r:        16px;
    --r-sm:     10px;
    --r-pill:   99px;
  }

  html, body { height: 100%; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Mesh background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 10% 0%, rgba(255,55,95,0.14) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(10,132,255,0.20) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 50% 50%, rgba(255,159,10,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  /* Animations */
  @keyframes fadein {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes pulse-ring {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.5; }
  }

  .fadein { animation: fadein 0.3s cubic-bezier(0.2,0,0,1) both; }
  .fadein-d1 { animation-delay: 0.05s; }
  .fadein-d2 { animation-delay: 0.10s; }
  .fadein-d3 { animation-delay: 0.15s; }
  .fadein-d4 { animation-delay: 0.20s; }

  /* Glass panel */
  .glass {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  /* Table base */
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ── DATA ─────────────────────────────────────────────── */
const RESULTS = [
  { pos:1, driver:'Иванов',  kart:7,  laps:18, best:'34.521', avg:'35.104', gap:'—',      delta:+3, score:87, color:'#ff375f' },
  { pos:2, driver:'Петров',  kart:3,  laps:18, best:'34.891', avg:'35.412', gap:'+2.1',   delta: 0, score:79, color:'#0a84ff' },
  { pos:3, driver:'Козлов',  kart:11, laps:18, best:'35.012', avg:'35.720', gap:'+5.3',   delta:-1, score:74, color:'#30d158' },
  { pos:4, driver:'Сидоров', kart:5,  laps:17, best:'35.448', avg:'37.102', gap:'+1 кр.', delta:+2, score:51, color:'#ffd60a' },
  { pos:5, driver:'Морозов', kart:9,  laps:17, best:'35.801', avg:'36.440', gap:'+1 кр.', delta:-2, score:63, color:'#ff9f0a' },
  { pos:6, driver:'Волков',  kart:2,  laps:16, best:'36.120', avg:'36.890', gap:'+2 кр.', delta: 0, score:55, color:'#bf5af2' },
];

const HISTORY = [
  { id:'1', date:'12.04.2025', time:'14:30', event:'CityFight', session:'Гонка 1', drivers:12, winner:'Иванов', race:true },
  { id:'2', date:'12.04.2025', time:'16:00', event:'CityFight', session:'Гонка 2', drivers:12, winner:'Петров', race:true },
  { id:'3', date:'05.04.2025', time:'11:00', event:'CityFight', session:'Квалификация', drivers:10, winner:'Козлов', race:false },
];

const SCORE_COLOR = s =>
  s >= 80 ? '#30d158' : s >= 65 ? '#9fe870' : s >= 50 ? '#ffd60a' : s >= 35 ? '#ff9f0a' : '#ff375f';

const PODIUM = { 1:'#ffd700', 2:'#c0c0c0', 3:'#cd7f32' };

/* ── PRIMITIVES ────────────────────────────────────────── */

function useHover() {
  const [h, setH] = React.useState(false);
  return [h, { onMouseEnter: () => setH(true), onMouseLeave: () => setH(false) }];
}

function Btn({ children, primary, sm, onClick, disabled, style }) {
  const [h, hProps] = useHover();
  const base = {
    fontFamily: 'inherit', fontWeight: 600, cursor: disabled ? 'not-allowed' : 'pointer',
    border: 'none', transition: 'all 0.18s cubic-bezier(0.2,0,0,1)',
    display: 'inline-flex', alignItems: 'center', gap: 6,
  };
  if (primary) return (
    <button {...hProps} onClick={disabled ? undefined : onClick} disabled={disabled} style={{
      ...base, padding: sm ? '9px 22px' : '13px 32px',
      fontSize: sm ? 13 : 15, borderRadius: 12,
      background: 'linear-gradient(135deg, #ff375f, #c0212b)',
      color: '#fff', opacity: disabled ? 0.35 : 1,
      boxShadow: h && !disabled ? '0 0 0 4px rgba(255,55,95,0.2), 0 8px 32px rgba(255,55,95,0.3)' : '0 4px 16px rgba(255,55,95,0.15)',
      transform: h && !disabled ? 'translateY(-1px)' : 'none',
      ...style,
    }}>{children}</button>
  );
  return (
    <button {...hProps} onClick={onClick} style={{
      ...base, padding: sm ? '7px 14px' : '9px 18px',
      fontSize: sm ? 12 : 13, borderRadius: 10,
      background: h ? 'rgba(255,255,255,0.09)' : 'rgba(255,255,255,0.22)',
      color: h ? 'rgba(240,240,248,0.9)' : 'rgba(240,240,248,0.5)',
      border: `1px solid ${h ? 'rgba(255,255,255,0.28)' : 'rgba(255,255,255,0.30)'}`,
      ...style,
    }}>{children}</button>
  );
}

function Pill({ children, active, onClick }) {
  const [h, hProps] = useHover();
  return (
    <button {...hProps} onClick={onClick} style={{
      fontFamily: 'inherit', fontWeight: 600, fontSize: 13,
      padding: '5px 16px', borderRadius: 99, cursor: 'pointer',
      transition: 'all 0.15s',
      background: active ? '#ff375f' : h ? 'rgba(255,255,255,0.30)' : 'rgba(255,255,255,0.10)',
      color: active ? '#fff' : h ? 'rgba(240,240,248,0.8)' : 'rgba(240,240,248,0.4)',
      border: `1px solid ${active ? '#ff375f' : 'rgba(255,255,255,0.30)'}`,
      boxShadow: active ? '0 0 16px rgba(255,55,95,0.3)' : 'none',
    }}>{children}</button>
  );
}

/* ── HEADER ─────────────────────────────────────────────── */
function Header({ showBack, onBack, subtitle }) {
  return (
    <header style={{
      position: 'sticky', top: 0, zIndex: 100,
      height: 56,
      background: 'rgba(7,7,15,0.8)',
      backdropFilter: 'blur(24px)',
      WebkitBackdropFilter: 'blur(24px)',
      borderBottom: '1px solid rgba(255,255,255,0.26)',
      display: 'flex', alignItems: 'center',
      padding: '0 24px',
      justifyContent: 'space-between',
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:14 }}>
        {showBack && <Btn sm onClick={onBack}>← Назад</Btn>}
        <span style={{
          fontSize: 17, fontWeight: 800, letterSpacing: '-0.01em',
          background: 'linear-gradient(90deg, #ff375f 0%, #ff9f0a 100%)',
          WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text',
        }}>Kart Race Analyzer</span>
      </div>
      {subtitle && (
        <span style={{ fontSize:12, color:'rgba(240,240,248,0.62)', letterSpacing:'0.02em' }}>{subtitle}</span>
      )}
    </header>
  );
}

/* ── UPLOAD SCREEN ──────────────────────────────────────── */
function UploadZone({ icon, label, loaded, filename, onClick }) {
  const [h, hProps] = useHover();
  const [drag, setDrag] = React.useState(false);
  const active = h || drag;
  return (
    <div {...hProps}
      onDragOver={e => { e.preventDefault(); setDrag(true); }}
      onDragLeave={() => setDrag(false)}
      onDrop={() => setDrag(false)}
      onClick={onClick}
      style={{
        borderRadius: 20, padding: '36px 24px', textAlign: 'center',
        cursor: 'pointer', transition: 'all 0.22s cubic-bezier(0.2,0,0,1)',
        background: loaded
          ? 'rgba(48,209,88,0.12)'
          : active ? 'rgba(255,55,95,0.14)' : 'rgba(255,255,255,0.09)',
        border: `1.5px ${loaded ? 'solid' : 'dashed'} ${
          loaded ? 'rgba(48,209,88,0.5)'
          : active ? 'rgba(255,55,95,0.6)' : 'rgba(255,255,255,0.1)'}`,
        boxShadow: loaded
          ? '0 0 40px rgba(48,209,88,0.08) inset'
          : active ? '0 0 40px rgba(255,55,95,0.14) inset' : 'none',
        transform: active && !loaded ? 'scale(1.01)' : 'none',
      }}>
      <div style={{ fontSize: 40, marginBottom: 14, filter: loaded ? 'none' : active ? 'none' : 'grayscale(0.3) opacity(0.7)' }}>{icon}</div>
      <div style={{ fontSize: 15, fontWeight: 700, color: loaded ? '#30d158' : active ? '#ff375f' : 'rgba(240,240,248,0.85)', marginBottom: 6 }}>{label}</div>
      {!loaded && <div style={{ fontSize: 12, color:'rgba(240,240,248,0.60)' }}>Перетащите PDF или нажмите</div>}
      {loaded && <div style={{ fontSize: 12, color:'#30d158', fontWeight: 500, marginTop: 4 }}>{filename}</div>}
    </div>
  );
}

function HistoryRow({ item, onLoad }) {
  const [h, hProps] = useHover();
  return (
    <div {...hProps} onClick={() => onLoad()} style={{
      display: 'flex', alignItems: 'center', gap: 14, padding: '13px 16px',
      borderRadius: 14, cursor: 'pointer', transition: 'all 0.15s',
      background: h ? 'rgba(255,255,255,0.24)' : 'rgba(255,255,255,0.09)',
      border: `1px solid ${h ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.24)'}`,
    }}>
      <div style={{
        width: 38, height: 38, borderRadius: 10, flexShrink: 0,
        background: item.race ? 'rgba(255,55,95,0.20)' : 'rgba(10,132,255,0.20)',
        border: `1px solid ${item.race ? 'rgba(255,55,95,0.2)' : 'rgba(10,132,255,0.2)'}`,
        display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18,
      }}>{item.race ? '🏁' : '⏱'}</div>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: 'rgba(240,240,248,0.9)' }}>
          {item.event} · {item.session}
        </div>
        <div style={{ fontSize: 11, color:'rgba(240,240,248,0.62)', marginTop: 2 }}>
          {item.date} · {item.drivers} пилотов · Победитель: <span style={{ color:'rgba(240,240,248,0.6)' }}>{item.winner}</span>
        </div>
      </div>
      <div style={{ fontSize: 11, color:'rgba(240,240,248,0.78)', paddingRight: 4 }}>›</div>
    </div>
  );
}

function UploadScreen({ onAnalyze }) {
  const [quali, setQuali] = React.useState(false);
  const [race, setRace] = React.useState(false);
  const [raceCnt, setRaceCnt] = React.useState(1);
  const [pits, setPits] = React.useState(1);
  const [q, setQ] = React.useState('');
  const canGo = quali || race;
  const items = HISTORY.filter(h => !q || [h.date, h.event, h.session, h.winner].join(' ').toLowerCase().includes(q.toLowerCase()));

  return (
    <div style={{ maxWidth: 820, margin: '0 auto', padding: '48px 24px' }}>

      {/* Upload zones */}
      <div className="fadein" style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:16 }}>
        <UploadZone icon="⏱" label="Квалификация (Q)" loaded={quali} filename="quali_cityfight.pdf" onClick={() => setQuali(v => !v)} />
        <UploadZone icon="🏁" label="Гонка (R)"        loaded={race}  filename="race_cityfight.pdf"  onClick={() => setRace(v => !v)} />
      </div>

      {/* Session config */}
      <div className="fadein fadein-d1" style={{
        display:'flex', gap:28, flexWrap:'wrap', alignItems:'center',
        padding:'14px 20px', marginBottom:28,
        background:'rgba(255,255,255,0.09)', borderRadius:14,
        border:'1px solid rgba(255,255,255,0.26)',
      }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ fontSize:12, color:'rgba(240,240,248,0.4)' }}>Гонок в день:</span>
          <div style={{ display:'flex', gap:5 }}>{[1,2,3].map(v => <Pill key={v} active={raceCnt===v} onClick={() => setRaceCnt(v)}>{v}</Pill>)}</div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ fontSize:12, color:'rgba(240,240,248,0.4)' }}>Питстопов:</span>
          <div style={{ display:'flex', gap:5 }}>{[0,1,2].map(v => <Pill key={v} active={pits===v} onClick={() => setPits(v)}>{v}</Pill>)}</div>
        </div>
      </div>

      {/* CTA */}
      <div className="fadein fadein-d2" style={{ textAlign:'center', marginBottom:56 }}>
        <Btn primary disabled={!canGo} onClick={onAnalyze}>
          {canGo ? 'Анализировать →' : 'Загрузите PDF для анализа'}
        </Btn>
      </div>

      {/* History */}
      <div className="fadein fadein-d3">
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
          <span style={{ fontSize:13, fontWeight:600, color:'rgba(240,240,248,0.72)' }}>Сохранённые результаты</span>
          <span style={{ fontSize:11, padding:'3px 10px', borderRadius:99, background:'rgba(10,132,255,0.20)', color:'#0a84ff', border:'1px solid rgba(10,132,255,0.2)' }}>☁ облако</span>
        </div>
        <input value={q} onChange={e => setQ(e.target.value)} placeholder="Поиск по событию, дате или пилоту..."
          style={{
            width:'100%', fontFamily:'inherit', fontSize:13,
            background:'rgba(255,255,255,0.10)', color:'rgba(240,240,248,0.85)',
            border:'1px solid rgba(255,255,255,0.30)', borderRadius:12,
            padding:'10px 16px', marginBottom:10, outline:'none',
            transition:'border-color 0.15s',
          }}
          onFocus={e => e.target.style.borderColor='rgba(255,55,95,0.4)'}
          onBlur={e => e.target.style.borderColor='rgba(255,255,255,0.30)'}
        />
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          {items.map(item => <HistoryRow key={item.id} item={item} onLoad={onAnalyze} />)}
        </div>
      </div>
    </div>
  );
}

/* ── ANALYSIS ───────────────────────────────────────────── */

/* Stat hero chip */
function StatHero({ value, label, color, delay }) {
  return (
    <div className={`fadein fadein-d${delay}`} style={{
      flex: 1, minWidth: 110,
      background: 'rgba(255,255,255,0.09)', borderRadius: 16,
      padding: '18px 20px',
      border: '1px solid rgba(255,255,255,0.26)',
    }}>
      <div style={{ fontSize: 28, fontWeight: 800, color: color || '#ff375f', lineHeight: 1, fontVariantNumeric:'tabular-nums', letterSpacing:'-0.02em' }}>{value}</div>
      <div style={{ fontSize: 11, color:'rgba(240,240,248,0.62)', marginTop: 7, fontWeight:500, letterSpacing:'0.06em', textTransform:'uppercase' }}>{label}</div>
    </div>
  );
}

/* Delta badge */
function Delta({ val }) {
  const up = val > 0, dn = val < 0;
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:2,
      padding:'3px 9px', borderRadius:99, fontSize:11, fontWeight:700,
      background: up ? 'rgba(48,209,88,0.12)' : dn ? 'rgba(255,55,95,0.20)' : 'rgba(255,255,255,0.24)',
      color: up ? '#30d158' : dn ? '#ff375f' : 'rgba(240,240,248,0.60)',
    }}>{up ? `↑ +${val}` : dn ? `↓ ${val}` : '—'}</span>
  );
}

/* Standings tab */
function StandingsTab() {
  return (
    <div>
      {/* Hero stats */}
      <div style={{ display:'flex', gap:10, marginBottom:24 }}>
        <StatHero value="6" label="Пилотов" color="#ff375f" delay={1} />
        <StatHero value="34.521" label="Лучший круг" color="#30d158" delay={2} />
        <StatHero value="18" label="Кругов" color="#0a84ff" delay={3} />
        <StatHero value="Иванов" label="Победитель" color="#ff375f" delay={4} />
      </div>

      {/* Table */}
      <div className="fadein fadein-d2" style={{ borderRadius:18, overflow:'hidden', border:'1px solid rgba(255,255,255,0.26)' }}>
        <table>
          <thead>
            <tr style={{ background:'rgba(255,255,255,0.10)' }}>
              {['#','Пилот','Карт','Кр.','Лучший','Средний','Разрыв','Δ'].map((h,i) => (
                <th key={h} style={{
                  padding:'11px 16px', fontSize:11, fontWeight:600,
                  color:'rgba(240,240,248,0.60)', letterSpacing:'0.08em',
                  textTransform:'uppercase', borderBottom:'1px solid rgba(255,255,255,0.26)',
                  textAlign: i >= 4 ? 'right' : 'left',
                }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {RESULTS.map((r, i) => (
              <tr key={r.driver} style={{
                background: i%2 ? 'rgba(255,255,255,0.015)' : 'transparent',
                borderLeft: PODIUM[r.pos] ? `3px solid ${PODIUM[r.pos]}` : '3px solid transparent',
                transition: 'background 0.1s',
              }}>
                <td style={{ padding:'13px 16px', fontSize:12, fontWeight:700, color:'rgba(240,240,248,0.78)', fontVariantNumeric:'tabular-nums' }}>{r.pos}</td>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:9 }}>
                    <div style={{ width:9, height:9, borderRadius:'50%', background:r.color, boxShadow:`0 0 8px ${r.color}80`, flexShrink:0 }}></div>
                    <span style={{ fontSize:14, fontWeight:600, color:'rgba(240,240,248,0.9)' }}>{r.driver}</span>
                  </div>
                </td>
                <td style={{ padding:'13px 16px', fontSize:13, color:'rgba(240,240,248,0.60)', fontVariantNumeric:'tabular-nums' }}>{r.kart}</td>
                <td style={{ padding:'13px 16px', fontSize:13, color:'rgba(240,240,248,0.4)', fontVariantNumeric:'tabular-nums' }}>{r.laps}</td>
                <td style={{ padding:'13px 16px', fontSize:13, fontVariantNumeric:'tabular-nums', textAlign:'right', fontWeight: i===0 ? 700 : 400, color: i===0 ? '#30d158' : 'rgba(240,240,248,0.75)' }}>{r.best}</td>
                <td style={{ padding:'13px 16px', fontSize:13, fontVariantNumeric:'tabular-nums', textAlign:'right', color: i===RESULTS.length-1 ? '#ff375f' : 'rgba(240,240,248,0.6)' }}>{r.avg}</td>
                <td style={{ padding:'13px 16px', fontSize:12, textAlign:'right', color:'rgba(240,240,248,0.60)', fontVariantNumeric:'tabular-nums' }}>{r.gap}</td>
                <td style={{ padding:'13px 16px', textAlign:'right' }}><Delta val={r.delta} /></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* Pace tab */
function PaceTab() {
  const best = parseFloat(RESULTS[0].avg);
  return (
    <div className="fadein" style={{ display:'flex', flexDirection:'column', gap:10 }}>
      <div style={{ fontSize:12, color:'rgba(240,240,248,0.60)', marginBottom:4 }}>Средний темп — ниже = лучше</div>
      {RESULTS.map((r, i) => {
        const v = parseFloat(r.avg);
        const pct = Math.max(6, 100 - ((v - best) / best * 100 * 20));
        return (
          <div key={r.driver} style={{ display:'flex', alignItems:'center', gap:14 }}>
            <div style={{ width:9, height:9, borderRadius:'50%', background:r.color, flexShrink:0, boxShadow:`0 0 8px ${r.color}80` }}></div>
            <span style={{ width:72, fontSize:13, color:'rgba(240,240,248,0.78)', flexShrink:0 }}>{r.driver}</span>
            <div style={{ flex:1, height:20, background:'rgba(255,255,255,0.10)', borderRadius:8, overflow:'hidden', border:'1px solid rgba(255,255,255,0.22)' }}>
              <div style={{
                height:'100%', width:`${pct}%`, background:r.color,
                borderRadius:8, opacity:0.8,
                transition:'width 0.8s cubic-bezier(0.2,0,0,1)',
                boxShadow:`0 0 12px ${r.color}50`,
              }}></div>
            </div>
            <span style={{ width:50, fontSize:13, color:'rgba(240,240,248,0.7)', textAlign:'right', fontVariantNumeric:'tabular-nums' }}>{r.avg}</span>
          </div>
        );
      })}
    </div>
  );
}

/* Arc score component */
function ArcScore({ score, color, size = 64 }) {
  const r = (size/2) - 6;
  const circ = 2 * Math.PI * r;
  const dash = circ * (score / 100);
  return (
    <svg width={size} height={size} style={{ transform:'rotate(-90deg)', flexShrink:0 }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.24)" strokeWidth={5} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={5}
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
        style={{ filter:`drop-shadow(0 0 4px ${color}80)`, transition:'stroke-dasharray 0.8s cubic-bezier(0.2,0,0,1)' }} />
    </svg>
  );
}

/* Driver rating card */
function DriverCard({ r, i }) {
  const color = SCORE_COLOR(r.score);
  const metrics = [
    { label:'Темп',         pct:30, val:Math.min(100,Math.round(r.score*1.05)), color:'#30d158' },
    { label:'Лучший круг',  pct:20, val:Math.min(100,Math.round(r.score*0.98)), color:'#0a84ff' },
    { label:'Стабильность', pct:25, val:Math.min(100,Math.round(r.score*0.92)), color:'#ffd60a' },
    { label:'Мастерство',   pct:15, val:Math.min(100,Math.round(r.score*0.88)), color:'#ff9f0a' },
    { label:'Шины',         pct:10, val:Math.min(100,Math.round(r.score*1.01)), color:'#bf5af2' },
  ];
  return (
    <div style={{
      background:'rgba(255,255,255,0.09)', borderRadius:18, padding:'20px',
      border:'1px solid rgba(255,255,255,0.26)',
      borderTop:`2px solid ${color}`,
      boxShadow:`0 0 30px ${color}10`,
    }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', gap:14, marginBottom:18 }}>
        <ArcScore score={r.score} color={color} size={60} />
        <div>
          <div style={{ fontSize:16, fontWeight:700, color:'rgba(240,240,248,0.9)' }}>{r.driver}</div>
          <div style={{ fontSize:11, color:'rgba(240,240,248,0.60)', marginTop:2 }}>Карт #{r.kart}</div>
          <div style={{ fontSize:22, fontWeight:800, color, lineHeight:1, marginTop:4 }}>{r.score}</div>
        </div>
      </div>

      {/* Metrics */}
      <div style={{ display:'flex', flexDirection:'column', gap:9 }}>
        {metrics.map(m => (
          <div key={m.label}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:5 }}>
              <span style={{ fontSize:11, color:'rgba(240,240,248,0.62)' }}>{m.label} <span style={{ color:'rgba(240,240,248,0.15)' }}>({m.pct}%)</span></span>
              <span style={{ fontSize:11, fontWeight:700, color:m.color }}>{m.val}</span>
            </div>
            <div style={{ height:3, background:'rgba(255,255,255,0.22)', borderRadius:99, overflow:'hidden' }}>
              <div style={{ height:'100%', width:`${m.val}%`, background:m.color, borderRadius:99, boxShadow:`0 0 8px ${m.color}60` }}></div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function RatingsTab() {
  return (
    <div className="fadein" style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(240px, 1fr))', gap:12 }}>
      {RESULTS.map((r,i) => <DriverCard key={r.driver} r={r} i={i} />)}
    </div>
  );
}

/* Analysis root */
const TABS = [
  { id:'standings', label:'Итоги' },
  { id:'pace',      label:'Темп' },
  { id:'ratings',   label:'Рейтинг пилотов' },
];

function AnalysisApp({ onBack }) {
  const [tab, setTab] = React.useState('standings');
  return (
    <div style={{ maxWidth:1100, margin:'0 auto', padding:'24px 24px' }}>
      {/* Event bar */}
      <div className="fadein" style={{
        display:'flex', gap:20, flexWrap:'wrap', marginBottom:20,
        padding:'10px 18px', background:'rgba(255,255,255,0.09)',
        borderRadius:12, border:'1px solid rgba(255,255,255,0.24)', fontSize:12,
      }}>
        {[['Дата','12.04.2025'],['Время','14:30'],['Событие','CityFight'],['Трасса','Lemans City'],['Категория','Любители']].map(([k,v]) => (
          <span key={k}>
            <span style={{ color:'rgba(240,240,248,0.60)' }}>{k}: </span>
            <span style={{ color:'rgba(240,240,248,0.75)', fontWeight:500 }}>{v}</span>
          </span>
        ))}
      </div>

      {/* Tabs */}
      <div className="fadein" style={{ display:'flex', gap:2, marginBottom:28, borderBottom:'1px solid rgba(255,255,255,0.26)' }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            fontFamily:'inherit', background:'transparent', border:'none',
            borderBottom:`2px solid ${tab===t.id ? '#ff375f' : 'transparent'}`,
            padding:'10px 18px', fontSize:13, cursor:'pointer', marginBottom:-1,
            color: tab===t.id ? 'rgba(240,240,248,0.9)' : 'rgba(240,240,248,0.62)',
            fontWeight: tab===t.id ? 600 : 400, transition:'all 0.15s',
          }}>{t.label}</button>
        ))}
      </div>

      {tab === 'standings' && <StandingsTab />}
      {tab === 'pace'      && <PaceTab />}
      {tab === 'ratings'   && <RatingsTab />}
    </div>
  );
}

/* ── ROOT ───────────────────────────────────────────────── */
function App() {
  const [screen, setScreen] = React.useState('upload');
  return (
    <>
      <Header
        showBack={screen === 'app'} onBack={() => setScreen('upload')}
        subtitle={screen === 'app' ? 'CityFight · Lemans City · 12.04.2025' : undefined}
      />
      {screen === 'upload'
        ? <UploadScreen onAnalyze={() => setScreen('app')} />
        : <AnalysisApp  onBack={() => setScreen('upload')} />
      }
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
